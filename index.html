    }
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(0,10,40,0.72) 0%,
        rgba(20,0,60,0.65) 50%,
        rgba(0,20,50,0.72) 100%);
      backdrop-filter: blur(1px);
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
      z-index: 1;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.15; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.8); }
    }
    .card {
      position: relative;
      z-index: 10;
      width: 380px;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 20px 60px rgba(0,0,30,0.6), inset 0 1px 0 rgba(255,255,255,0.12);
      animation: slideUp 0.6s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .chat-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, rgba(26,58,255,0.85) 0%, rgba(139,43,226,0.85) 100%);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      border: 1.5px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .header-name {
      font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 700;
      color: #fff;
    }
    .header-status {
      font-size: 11px;
      color: rgba(255,255,255,0.65);
      display: flex; align-items: center; gap: 5px;
      margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(74,222,128,0); }
    }
    .college-badge {
      margin-left: auto;
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      text-align: right;
      line-height: 1.4;
    }
    .chat-box {
      height: 310px;
      padding: 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .msg {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
      max-width: 82%;
      animation: popIn 0.22s cubic-bezier(.22,.68,0,1.3) both;
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .bot-msg {
      background: rgba(255,255,255,0.12);
      color: #d4d8ff;
      border-radius: 14px 14px 14px 3px;
      border: 1px solid rgba(255,255,255,0.1);
      align-self: flex-start;
    }
    .user-msg {
      background: linear-gradient(135deg, #1a3aff, #8b2be2);
      color: #fff;
      border-radius: 14px 14px 3px 14px;
      align-self: flex-end;
      margin-left: auto;
    }
    .typing-wrap { align-self: flex-start; }
    .typing {
      display: flex; gap: 5px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.09);
      border-radius: 14px 14px 14px 3px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a5b4fc;
      animation: bounce 1.3s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-9px); }
    }
    .quick-wrap {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 0 14px 10px;
    }
    .quick-btn {
      font-size: 11px;
      padding: 5px 11px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      color: #c0caff;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .quick-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.04); }
    .chat-input {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.25);
    }
    .chat-input input {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 10px 16px;
      color: #fff;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input input::placeholder { color: rgba(255,255,255,0.35); }
    .chat-input input:focus { border-color: rgba(139,43,226,0.6); }
    .send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3aff, #8b2be2);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.2s;
    }
    .send-btn:hover  { opacity: 0.85; transform: scale(1.07); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .watermark {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
      font-family: 'Sora', sans-serif;
    }
  </style>
</head>
<body>

<div class="bg" id="bg"></div>
<div id="particles" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></div>

<div class="card">
  <div class="chat-header">
    <div class="avatar">🎓</div>
    <div>
      <div class="header-name">NIITM Chatbot</div>
      <div class="header-status">
        <span class="status-dot"></span> Online &bull; Ask me anything
      </div>
    </div>
    <div class="college-badge">Nehru Institute<br>Coimbatore</div>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg bot-msg">Hello! 👋 Welcome to NIITM. I'm here to help you with courses, admissions, campus info, and more!</div>
  </div>

  <div class="quick-wrap">
    <button class="quick-btn" onclick="askQuick('courses')">📚 Courses</button>
    <button class="quick-btn" onclick="askQuick('admission')">📝 Admission</button>
    <button class="quick-btn" onclick="askQuick('hostel')">🏠 Hostel</button>
    <button class="quick-btn" onclick="askQuick('placement')">💼 Placement</button>
    <button class="quick-btn" onclick="askQuick('location')">📍 Location</button>
    <button class="quick-btn" onclick="askQuick('contact')">📞 Contact</button>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your question..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="watermark">Nehru Institute of Information Technology &amp; Management</div>
</div>

<script>
  const pts = document.getElementById('particles');
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${(Math.random()*4).toFixed(2)}s;animation-duration:${(2+Math.random()*3).toFixed(2)}s;`;
    pts.appendChild(p);
  }

  function getResponse(input) {
    if (input.includes("hello")||input.includes("hi")||input.includes("hey")) return "Hello! 👋 Great to have you here. What would you like to know about NIITM?";
    if (input.includes("niitm")) return "NIITM is Nehru Institute of Information Technology and Management, Coimbatore — approved by AICTE and affiliated with Anna University, Chennai.";
    if (input.includes("courses")) return "NIITM offers MBA and MCA postgraduate programs. Both are 2-year courses with 4 semesters.";
    if (input.includes("mba")) return "MBA is a 2-year postgraduate program with specializations in Marketing, Finance, HR, Operations, and Systems.";
    if (input.includes("mca")) return "MCA is a 2-year postgraduate program in Computer Applications with hands-on lab training.";
    if (input.includes("duration")||input.includes("years")) return "Both MBA and MCA programs are 2 years long, comprising 4 semesters.";

  function appendMsg(text, type) {
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const chatBox = document.getElementById('chatBox');
    const wrap = document.createElement('div');
    wrap.className = 'typing-wrap';
    wrap.id = 'typingIndicator';
    wrap.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    chatBox.appendChild(wrap);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function sendMsg() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    appendMsg(text, 'user-msg');
    input.value = '';
    showTyping();
    setTimeout(() => {
      hideTyping();
      appendMsg(getResponse(text.toLowerCase()), 'bot-msg');
    }, 900);
  }

  function askQuick(topic) {
    document.getElementById('userInput').value = topic;
    sendMsg();
  }
</script>
